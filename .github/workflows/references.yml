name: references
on:
  push:
    paths:
      - references.bib
      - docs/09_fuentes_por_experimento.md
      - scripts/verify_references.py
      - .github/workflows/references.yml
  pull_request:
    paths:
      - references.bib
      - docs/09_fuentes_por_experimento.md
      - scripts/verify_references.py
      - .github/workflows/references.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Verify references
        run: python scripts/verify_references.py --report artifacts/reference-verification.json
      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reference-verification-${{ github.run_id }}
          path: artifacts/reference-verification.json
          if-no-files-found: error
          retention-days: 30
