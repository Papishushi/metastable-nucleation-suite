name: specifications
on:
  push:
    paths:
      - experiments/specifications.yaml
      - experiments/specifications.schema.json
      - scripts/validate_specifications.py
      - references.bib
      - .github/workflows/specifications.yml
  pull_request:
    paths:
      - experiments/specifications.yaml
      - experiments/specifications.schema.json
      - scripts/validate_specifications.py
      - references.bib
      - .github/workflows/specifications.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install PyYAML
      - run: python scripts/validate_specifications.py
