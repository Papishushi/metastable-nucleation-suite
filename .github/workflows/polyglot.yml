name: polyglot

on:
  pull_request:
    paths:
      - "dotnet/**"
      - "visualizer/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "global.json"
      - "contracts/**"
      - "services/**"
      - "deploy/**"
      - "compose.yaml"
      - "scripts/check_extend0_release.py"
      - "scripts/check_control_plane_contract.py"
      - "scripts/smoke_control_plane.py"
      - ".github/workflows/polyglot.yml"
  push:
    branches: [main]

jobs:
  rust-wasm-visualizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Show pinned Rust toolchain
        run: |
          rustc --version
          cargo --version
      - name: Check formatting
        run: cargo fmt --check
      - name: Enforce the Rust/WASM-only application boundary
        run: python scripts/check_visualizer_language_policy.py
      - name: Lint native targets
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Lint the browser target
        run: cargo clippy --locked --target wasm32-unknown-unknown --lib --tests -- -D warnings
      - name: Run native contract and invariant tests
        run: cargo test --locked
      - name: Install pinned WASM browser test runner
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked
      - name: Run contract validation through generated bindings in headless Chrome
        env:
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER: wasm-bindgen-test-runner
          CHROMEDRIVER: /usr/bin/chromedriver
          WASM_BINDGEN_TEST_ONLY_WEB: "1"
        run: cargo test --locked --target wasm32-unknown-unknown --test wasm
      - name: Build the browser target
        run: cargo build --locked --release --target wasm32-unknown-unknown

  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            smoke: true
          - rid: win-arm64
            runner: windows-latest
            smoke: false
          - rid: linux-x64
            runner: ubuntu-latest
            smoke: true
          - rid: linux-arm64
            runner: ubuntu-latest
            smoke: false
          - rid: osx-x64
            runner: macos-15-intel
            smoke: true
          - rid: osx-arm64
            runner: macos-15
            smoke: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: "10.0.x"
          global-json-file: global.json
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.14"
      - name: Show .NET SDK
        run: dotnet --info
      - name: Build solution
        run: dotnet build dotnet/Metastable.Platform.sln -c Release
      - name: Verify durable control-plane recovery
        run: >-
          dotnet run
          --project dotnet/Metastable.ControlPlane/Metastable.ControlPlane.csproj
          -c Release --no-build -- --self-test
      - name: Verify generated control-plane OpenAPI
        shell: bash
        run: |
          dotnet run \
            --project dotnet/Metastable.ControlPlane/Metastable.ControlPlane.csproj \
            -c Release --no-build -- --print-openapi \
            > artifacts/control-plane.openapi.json
          python scripts/check_control_plane_contract.py \
            artifacts/control-plane.openapi.json
      - name: Publish self-contained artifact
        shell: bash
        run: >-
          dotnet publish dotnet/Metastable.Platform.Cli/Metastable.Platform.Cli.csproj
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:PublishSingleFile=true -o artifacts/${{ matrix.rid }}
      - name: Smoke test Unix artifact
        if: matrix.smoke && runner.os != 'Windows'
        shell: bash
        run: |
          artifacts/${{ matrix.rid }}/metastable-platform --version
          artifacts/${{ matrix.rid }}/metastable-platform --self-test
          python scripts/check_extend0_release.py doctor \
            artifacts/${{ matrix.rid }}/metastable-platform
      - name: Smoke test Windows artifact
        if: matrix.smoke && runner.os == 'Windows'
        shell: pwsh
        run: |
          artifacts/${{ matrix.rid }}/metastable-platform.exe --version
          artifacts/${{ matrix.rid }}/metastable-platform.exe --self-test
          python scripts/check_extend0_release.py doctor artifacts/${{ matrix.rid }}/metastable-platform.exe
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: metastable-platform-${{ matrix.rid }}
          path: artifacts/${{ matrix.rid }}

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"
      - run: pip install jsonschema rfc3339-validator
      - name: Validate contract fixtures
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator, FormatChecker

          fixtures = [
              (
                  'contracts/v1/experiment-request.schema.json',
                  {
                      'schema_version': '1.0.0',
                      'request_id': '11111111-1111-1111-1111-111111111111',
                      'experiment_id': 'contract-smoke',
                      'submitted_at_utc': '2026-07-12T12:00:00Z',
                  },
              ),
              (
                  'contracts/v1/server-capabilities.schema.json',
                  {
                      'schema_version': '1.0.0',
                      'server_version': '0.2.0',
                      'generated_at_utc': '2026-07-12T12:00:00Z',
                      'capabilities': [
                          {
                              'id': 'experiments.execute.v1',
                              'status': 'active',
                              'since_version': '0.1.0',
                          },
                          {
                              'id': 'experiments.plan.v1',
                              'status': 'deprecated',
                              'since_version': '0.1.0',
                              'deprecated_since_version': '0.2.0',
                              'sunset_at_utc': '2027-01-01T00:00:00Z',
                              'replacement': 'experiments.execute.v1',
                          },
                      ],
                  },
              ),
              (
                  'contracts/v1/visualization-scene.schema.json',
                  json.load(open(
                      'contracts/v1/fixtures/visualization-scene-e09.json'
                  )),
              ),
              (
                  'contracts/v1/control-plane-run.schema.json',
                  {
                      'schema_version': '1.0.0',
                      'run_id': '11111111-1111-1111-1111-111111111111',
                      'request_id': '22222222-2222-2222-2222-222222222222',
                      'experiment_id': 'contract-smoke',
                      'state': 'queued',
                      'created_at_utc': '2026-07-15T00:00:00Z',
                      'updated_at_utc': '2026-07-15T00:00:00Z',
                      'failure': None,
                      'transitions': [
                          {
                              'state': 'queued',
                              'at_utc': '2026-07-15T00:00:00Z',
                              'reason': 'accepted',
                          },
                      ],
                  },
              ),
              (
                  'contracts/v1/control-plane-artifact.schema.json',
                  {
                      'schema_version': '1.0.0',
                      'run_id': '11111111-1111-1111-1111-111111111111',
                      'artifact': {
                          'artifact_id': 'primary',
                          'uri': '/artifacts/22222222.json',
                          'media_type': 'application/json',
                          'response_sha256': 'a' * 64,
                      },
                      'indexed_at_utc': '2026-07-15T00:00:01Z',
                  },
              ),
          ]

          for schema_path, fixture in fixtures:
              schema = json.load(open(schema_path))
              Draft202012Validator(
                  schema, format_checker=FormatChecker()
              ).validate(fixture)
          PY

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Build images
        run: docker compose --profile distributed build --quiet
      - name: Start distributed control plane
        run: docker compose --profile distributed up -d --wait control-plane
      - name: Verify compose worker canonical version
        shell: bash
        run: |
          expected="$(tr -d '\r\n' < VERSION)"
          actual="$(docker compose exec -T scientific-worker python -c "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8081/v1/capabilities'))['server_version'])")"
          test "$actual" = "$expected"
      - name: Smoke test CLI image and capability discovery
        run: |
          docker compose run --rm --no-deps platform-cli --version
          docker compose run --rm --no-deps platform-cli --self-test
          docker compose run --rm --no-deps platform-cli capabilities
      - name: Execute capability-gated distributed request
        id: distributed-request
        shell: bash
        run: |
          mkdir -p container-diagnostics
          set +e
          docker compose run --rm --no-deps platform-cli execute compose-smoke-test \
            >container-diagnostics/cli.log 2>&1
          status=$?
          docker compose logs --no-color scientific-worker \
            >container-diagnostics/worker.log 2>&1
          printf '%s\n' "$status" >container-diagnostics/exit-code.txt
          cat container-diagnostics/cli.log
          cat container-diagnostics/worker.log
          exit "$status"
      - name: Exercise durable Extend0-orchestrated control plane
        run: >-
          python scripts/smoke_control_plane.py submit
          container-diagnostics/control-plane-run.json
      - name: Restart control plane
        run: docker compose --profile distributed restart control-plane
      - name: Verify control-plane state and artifact index after restart
        run: >-
          python scripts/smoke_control_plane.py verify
          container-diagnostics/control-plane-run.json
      - name: Verify persisted artifact
        run: >-
          docker compose exec -T scientific-worker python -c
          "from pathlib import Path; files=list(Path('/artifacts').glob('*.json'));
          assert files, 'no persisted artifact'; print(files[0])"
      - name: Upload container diagnostics
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: container-diagnostics
          path: container-diagnostics
          if-no-files-found: warn
      - name: Container diagnostics
        if: always()
        run: |
          docker compose ps -a
          docker compose logs --no-color
      - name: Cleanup containers
        if: always()
        run: docker compose --profile distributed down -v
