name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: python scripts/validate_catalog.py
      - run: python scripts/validate_specifications.py
      - name: Validate bibliography structure
        run: python scripts/verify_references.py --no-network
      - name: Validate semantic example ABox
        run: python scripts/semantic_graph.py validate ontology/examples/reference-run.jsonld
      - name: Smoke-test semantic query
        run: python scripts/semantic_graph.py query ontology/examples/reference-run.jsonld ontology/queries/completed-runs.rq > artifacts/completed-runs.json
      - name: Smoke-test analytical power planner
        run: python scripts/plan_experiment.py --experiment chsh --target-s 2.4 --output artifacts/chsh-plan.json
      - name: Smoke-test Monte Carlo power planner
        run: python scripts/monte_carlo_power.py --design correlation --sample-size 500 --rho 0.15 --alpha 0.05 --repetitions 200 --output artifacts/correlation-power.json
      - name: Execute semantic plan
        run: python scripts/semantic_execute.py ontology/examples/planned-e09.jsonld artifacts/execution
      - name: Run tests
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          pytest -q | tee artifacts/pytest.txt
      - name: Generate reference report
        run: python scripts/run_suite.py --trials 50000 --seed 7
      - name: Validate reference report
        run: python scripts/validate_reference_report.py artifacts/reference_report.json
      - name: Materialize semantic ABox
        run: python scripts/semantic_graph.py from-report artifacts/reference_report.json artifacts/reference_run.jsonld --run-id ci-${{ github.run_id }}
      - name: Upload scientific artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: scientific-artifacts-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
