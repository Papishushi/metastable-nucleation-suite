name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: python scripts/validate_catalog.py
      - name: Verify bibliography against Crossref
        run: python scripts/verify_references.py
      - run: pytest -q
      - name: Generate reference report
        run: python scripts/run_suite.py --trials 50000 --seed 7
      - name: Validate reference report
        run: python scripts/validate_reference_report.py artifacts/reference_report.json
      - name: Upload reference report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reference-report-${{ github.run_id }}
          path: artifacts/reference_report.json
          if-no-files-found: error
          retention-days: 30
