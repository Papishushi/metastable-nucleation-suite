services:
  artifact-init:
    image: python:3.14-slim
    user: root
    command: ["chown", "10001:10001", "/artifacts"]
    volumes:
      - artifacts:/artifacts

  control-plane-state-init:
    profiles: ["distributed"]
    image: busybox:1.37.0-musl
    user: root
    command: ["chown", "1654:1654", "/state"]
    volumes:
      - control-plane-state:/state

  scientific-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.scientific-worker
    environment:
      METASTABLE_ARTIFACTS: /artifacts
    ports:
      - "8081:8081"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - artifacts:/artifacts
    depends_on:
      artifact-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/healthz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  platform-cli:
    build:
      context: .
      dockerfile: deploy/Dockerfile.platform-cli
    environment:
      METASTABLE_SCIENTIFIC_WORKER_URL: http://scientific-worker:8081
    depends_on:
      scientific-worker:
        condition: service_healthy
    command: ["execute", "compose-smoke-test"]

  control-plane:
    profiles: ["distributed"]
    build:
      context: .
      dockerfile: deploy/Dockerfile.control-plane
    environment:
      METASTABLE_CONTROL_PLANE_STATE: /state
      METASTABLE_SCIENTIFIC_WORKER_URL: http://scientific-worker:8081
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - control-plane-state:/state
    depends_on:
      control-plane-state-init:
        condition: service_completed_successfully
      scientific-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/metastable-control-plane", "--health-check", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  artifacts:
  control-plane-state:
